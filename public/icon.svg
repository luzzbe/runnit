<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#6366f1"/>
  <g fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="280" cy="98" r="46" fill="white" stroke="none"/>
    <!-- Torso (leaning forward) -->
    <line x1="270" y1="144" x2="245" y2="278" stroke-width="36"/>
    <!-- Front arm bent down-forward -->
    <polyline points="265,178 195,225 168,300" stroke-width="30"/>
    <!-- Back arm swept up-back -->
    <polyline points="265,178 330,200 368,148" stroke-width="30"/>
    <!-- Front leg: knee raised (thigh up, shin angled down-forward) -->
    <polyline points="245,278 200,358 238,432" stroke-width="32"/>
    <!-- Back leg: heel kicked up behind -->
    <polyline points="245,278 295,358 340,300" stroke-width="32"/>
  </g>
</svg>
